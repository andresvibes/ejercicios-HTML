<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Pendientes</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="container">

        <div class="title">
            <h1>Lista de Pendientes</h1>
            <img src="images/icon.jpg" alt="icono">
        </div>

        <div class="todo-list-bar">
            <input 
                type="text" 
                id="task" 
                placeholder="Ingrese una tarea ..."
            >

            <button id="addBtn">
                Agregar
            </button>
        </div>

        <ul id="taskList">

        </ul>

    </div>

    <script src="js/script.js"></script>

</body>
</html>
